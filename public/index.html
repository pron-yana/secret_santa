<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Головна</title>
    <link href="/styles/styles.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --green-deep:   #162d20;
        --green-mid:    #264d35;
        --green-light:  #3a7051;
        --gold:         #c9a84c;
        --gold-light:   #e8c97a;
        --cream:        #faf5eb;
        --cream-dark:   #f0e8d5;
        --text-dark:    #1a1a1a;
        --text-mid:     #4a4a4a;
        --text-muted:   #7a7264;
        --white:        #ffffff;
        --red:          #b94040;
        --shadow-warm:  0 8px 40px rgba(22,45,32,0.14);
        --radius:       14px;
      }

      body {
        min-height: 100vh;
        background-color: var(--cream);
        background-image:
          radial-gradient(ellipse at 10% 30%, rgba(58,112,81,0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 90% 70%, rgba(201,168,76,0.08) 0%, transparent 50%),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23264d35' fill-opacity='0.035'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        font-family: 'Lora', Georgia, serif;
        padding-bottom: 3rem;
      }

      /* ── Top Nav ── */
      .topbar {
        background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
        padding: 0 2rem;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 20px rgba(22,45,32,0.25);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 0.65rem;
      }

      .topbar-brand svg {
        width: 22px;
        height: 22px;
        fill: var(--gold);
        flex-shrink: 0;
      }

      .topbar-brand span {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--white);
        letter-spacing: 0.01em;
      }

      .btn-logout {
        background: transparent;
        border: 1.5px solid rgba(201,168,76,0.5);
        color: var(--gold-light);
        padding: 0.45rem 1.1rem;
        border-radius: 6px;
        font-family: 'Lora', serif;
        font-size: 0.85rem;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s, color 0.2s;
        letter-spacing: 0.02em;
      }

      .btn-logout:hover {
        background: rgba(201,168,76,0.12);
        border-color: var(--gold);
        color: var(--white);
      }

      /* ── Page Content ── */
      .page-content {
        max-width: 660px;
        margin: 0 auto;
        padding: 2.5rem 1.25rem 0;
        animation: fadeUp 0.5s ease both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 2rem;
        flex-wrap: wrap;
        gap: 1rem;
      }

      .page-title-group h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 2rem;
        font-weight: 700;
        color: var(--green-deep);
        letter-spacing: -0.02em;
        line-height: 1.15;
      }

      .page-title-group p {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-top: 0.25rem;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.7rem 1.4rem;
        background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-deep) 100%);
        color: var(--white);
        border: none;
        border-radius: 8px;
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.15s, box-shadow 0.15s;
        box-shadow: 0 4px 14px rgba(22,45,32,0.22);
        white-space: nowrap;
      }

      .btn-primary svg { width: 16px; height: 16px; fill: var(--gold); flex-shrink: 0; }
      .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(22,45,32,0.30); }
      .btn-primary:active { transform: translateY(0); }

      /* ── Events List ── */
      .events-container {
        background: var(--white);
        border-radius: var(--radius);
        box-shadow: var(--shadow-warm);
        border: 1px solid rgba(201,168,76,0.15);
        overflow: hidden;
      }

      .events-container-header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--cream-dark);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .events-container-header span {
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .events-container-header .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--gold);
        flex-shrink: 0;
      }

      #eventsList { list-style: none; }

      .event-item {
        display: flex;
        align-items: center;
        padding: 1.1rem 1.5rem;
        border-bottom: 1px solid var(--cream-dark);
        cursor: pointer;
        transition: background 0.15s;
        gap: 1rem;
      }

      .event-item:last-child { border-bottom: none; }
      .event-item:hover { background: var(--cream); }

      .event-icon {
        width: 40px; height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--green-mid), var(--green-deep));
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }

      .event-icon svg { width: 18px; height: 18px; fill: var(--gold); }

      .event-info { flex: 1; min-width: 0; }

      .event-name {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-dark);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .event-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.15rem; }

      .event-badge {
        font-size: 0.72rem;
        font-weight: 500;
        padding: 0.25rem 0.65rem;
        border-radius: 20px;
        flex-shrink: 0;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .badge-active {
        background: rgba(58,112,81,0.12);
        color: var(--green-light);
        border: 1px solid rgba(58,112,81,0.25);
      }

      .badge-done {
        background: rgba(201,168,76,0.12);
        color: #8a7030;
        border: 1px solid rgba(201,168,76,0.3);
      }

      .event-arrow { color: var(--cream-dark); font-size: 1rem; flex-shrink: 0; }

      .empty-state {
        padding: 3.5rem 2rem;
        text-align: center;
      }

      .empty-state svg { width: 48px; height: 48px; fill: var(--cream-dark); margin-bottom: 1rem; }

      .empty-state p {
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      /* Skeleton loading */
      .skeleton-item {
        display: flex;
        align-items: center;
        padding: 1.1rem 1.5rem;
        border-bottom: 1px solid var(--cream-dark);
        gap: 1rem;
      }

      .skeleton { background: linear-gradient(90deg, var(--cream-dark) 25%, #e8dfc8 50%, var(--cream-dark) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
      .sk-icon { width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0; }
      .sk-lines { flex: 1; }
      .sk-line1 { height: 14px; width: 55%; margin-bottom: 6px; }
      .sk-line2 { height: 10px; width: 35%; }
      .sk-badge { width: 60px; height: 22px; border-radius: 20px; flex-shrink: 0; }
      @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <div class="topbar-brand">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 7h-1.26A4.5 4.5 0 0 0 9 5.5V6H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1zm-8 0a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 2.45 2H11v2.17A2.47 2.47 0 0 1 12 7zm0 2h7v2h-7V9zm0 4h7v2h-7v-2zm-5-4h3v2H7V9zm0 4h3v2H7v-2z"/>
        </svg>
        <span>Таємний Санта</span>
      </div>
      <button id="logoutButton" class="btn-logout">Вийти</button>
    </nav>

    <div class="page-content">
      <div class="page-header">
        <div class="page-title-group">
          <h1>Список Свят</h1>
          <p>Оберіть свято або створіть нове</p>
        </div>
        <button id="createEventButton" class="btn-primary">
          <svg viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
          Нове свято
        </button>
      </div>

      <div class="events-container">
        <div class="events-container-header">
          <span class="dot"></span>
          <span>Доступні свята</span>
        </div>
        <ul id="eventsList">
          <!-- Skeleton loaders -->
          <li class="skeleton-item">
            <div class="skeleton sk-icon"></div>
            <div class="sk-lines"><div class="skeleton sk-line1"></div><div class="skeleton sk-line2"></div></div>
            <div class="skeleton sk-badge"></div>
          </li>
          <li class="skeleton-item">
            <div class="skeleton sk-icon"></div>
            <div class="sk-lines"><div class="skeleton sk-line1"></div><div class="skeleton sk-line2"></div></div>
            <div class="skeleton sk-badge"></div>
          </li>
        </ul>
      </div>
    </div>

    <script type="module">
      import { fetchEvents } from './scripts/main.js';

      document.addEventListener('DOMContentLoaded', async () => {
        const logoutButton = document.getElementById('logoutButton');
        const createEventButton = document.getElementById('createEventButton');
        const eventsList = document.getElementById('eventsList');

        // Logout functionality
        logoutButton.addEventListener('click', async () => {
          try {
            const response = await fetch('/api/logout', {
              method: 'POST',
              credentials: 'include',
            });

            if (response.ok) {
              window.location.href = '/login';
            } else {
              const result = await response.json();
              alert(result.message || 'Помилка виходу.');
            }
          } catch (error) {
            console.error('Помилка виходу:', error);
            alert('Сталася помилка. Спробуйте ще раз пізніше.');
          }
        });

        createEventButton.addEventListener('click', () => {
          window.location.href = '/create-event';
        });

        const events = await fetchEvents();

        // Clear skeletons
        eventsList.innerHTML = '';

        const giftIconSvg = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 7h-1.26A4.5 4.5 0 0 0 9 5.5V6H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1zm-8 0a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 2.45 2H11v2.17A2.47 2.47 0 0 1 12 7zm0 2h7v2h-7V9zm0 4h7v2h-7v-2zm-5-4h3v2H7V9zm0 4h3v2H7v-2z"/></svg>`;

        if (events.length === 0) {
          const emptyEl = document.createElement('li');
          emptyEl.className = 'empty-state';
          emptyEl.innerHTML = `<svg viewBox="0 0 24 24"><path d="M20 7h-1.26A4.5 4.5 0 0 0 9 5.5V6H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1zm-8 0a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 2.45 2H11v2.17A2.47 2.47 0 0 1 12 7z"/></svg><p>Наразі немає доступних свят.<br>Створіть перше!</p>`;
          eventsList.appendChild(emptyEl);
        } else {
          events.forEach((event, i) => {
            const listItem = document.createElement('li');
            listItem.className = 'event-item';
            listItem.style.animationDelay = `${i * 60}ms`;
            const isCompleted = event.completed;
            listItem.innerHTML = `
              <div class="event-icon">${giftIconSvg}</div>
              <div class="event-info">
                <div class="event-name">${event.name}</div>
                <div class="event-meta">${isCompleted ? 'Свято завершено' : 'Участь відкрита'}</div>
              </div>
              <span class="event-badge ${isCompleted ? 'badge-done' : 'badge-active'}">${isCompleted ? 'Завершено' : 'Активне'}</span>
              <span class="event-arrow">›</span>
            `;
            listItem.addEventListener('click', () => {
              window.location.href = `/event?id=${event._id}`;
            });
            eventsList.appendChild(listItem);
          });
        }
      });
    </script>
  </body>
</html>
