<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Створити Свято</title>
    <link href="/styles/styles.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --green-deep:   #162d20;
        --green-mid:    #264d35;
        --green-light:  #3a7051;
        --gold:         #c9a84c;
        --gold-light:   #e8c97a;
        --cream:        #faf5eb;
        --cream-dark:   #f0e8d5;
        --text-dark:    #1a1a1a;
        --text-mid:     #4a4a4a;
        --text-muted:   #7a7264;
        --white:        #ffffff;
        --shadow-warm:  0 8px 40px rgba(22,45,32,0.14);
        --radius:       14px;
      }

      body {
        min-height: 100vh;
        background-color: var(--cream);
        background-image:
          radial-gradient(ellipse at 15% 50%, rgba(58,112,81,0.08) 0%, transparent 55%),
          radial-gradient(ellipse at 85% 20%, rgba(201,168,76,0.09) 0%, transparent 50%),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23264d35' fill-opacity='0.035'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        font-family: 'Lora', Georgia, serif;
        padding-bottom: 3rem;
      }

      /* ── Top Nav ── */
      .topbar {
        background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
        padding: 0 2rem;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 2px 20px rgba(22,45,32,0.25);
      }

      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 0.65rem;
      }

      .topbar-brand svg { width: 22px; height: 22px; fill: var(--gold); flex-shrink: 0; }

      .topbar-brand span {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.15rem;
        font-weight: 700;
        color: var(--white);
      }

      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: rgba(255,255,255,0.75);
        text-decoration: none;
        font-size: 0.88rem;
        font-family: 'Lora', serif;
        transition: color 0.2s;
        letter-spacing: 0.02em;
      }

      .btn-back:hover { color: var(--gold-light); }
      .btn-back svg { width: 16px; height: 16px; fill: currentColor; }

      /* ── Page ── */
      .page-content {
        max-width: 560px;
        margin: 0 auto;
        padding: 2.5rem 1.25rem 0;
        animation: fadeUp 0.5s ease both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .page-eyebrow {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .page-eyebrow .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--gold);
      }

      .page-eyebrow span {
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .card {
        background: var(--white);
        border-radius: var(--radius);
        box-shadow: var(--shadow-warm);
        border: 1px solid rgba(201,168,76,0.15);
        overflow: hidden;
      }

      .card-header {
        background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
        padding: 2rem 2rem 1.75rem;
        position: relative;
        overflow: hidden;
      }

      .card-header::before {
        content: '';
        position: absolute;
        top: -40px; right: -40px;
        width: 130px; height: 130px;
        border-radius: 50%;
        background: rgba(201,168,76,0.10);
      }

      .card-header::after {
        content: '';
        position: absolute;
        bottom: -25px; left: 40px;
        width: 80px; height: 80px;
        border-radius: 50%;
        background: rgba(255,255,255,0.04);
      }

      .card-header-inner {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .header-icon {
        width: 52px; height: 52px;
        border-radius: 12px;
        background: rgba(201,168,76,0.18);
        border: 1px solid rgba(201,168,76,0.3);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }

      .header-icon svg { width: 24px; height: 24px; fill: var(--gold); }

      .card-header h2 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--white);
        line-height: 1.2;
      }

      .card-header p {
        color: rgba(255,255,255,0.6);
        font-size: 0.85rem;
        margin-top: 0.25rem;
      }

      .card-body { padding: 2rem; }

      .form-group { margin-bottom: 1.5rem; }

      .form-label {
        display: block;
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--text-mid);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }

      .form-hint {
        font-size: 0.78rem;
        color: var(--text-muted);
        margin-top: 0.4rem;
      }

      .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1.5px solid var(--cream-dark);
        border-radius: 8px;
        font-family: 'Lora', Georgia, serif;
        font-size: 0.95rem;
        color: var(--text-dark);
        background: var(--cream);
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        outline: none;
        -webkit-appearance: none;
        resize: vertical;
      }

      .form-control:focus {
        border-color: var(--green-light);
        background: var(--white);
        box-shadow: 0 0 0 3px rgba(58,112,81,0.12);
      }

      .form-control::placeholder { color: #b0a898; }

      textarea.form-control { min-height: 120px; line-height: 1.6; }

      .divider {
        height: 1px;
        background: var(--cream-dark);
        margin: 0.5rem 0 1.5rem;
      }

      .btn-primary {
        width: 100%;
        padding: 0.9rem 1.5rem;
        background: linear-gradient(135deg, var(--green-mid) 0%, var(--green-deep) 100%);
        color: var(--white);
        border: none;
        border-radius: 8px;
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
        box-shadow: 0 4px 14px rgba(22,45,32,0.22);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        position: relative;
        overflow: hidden;
      }

      .btn-primary svg { width: 18px; height: 18px; fill: var(--gold); flex-shrink: 0; }

      .btn-primary::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(201,168,76,0.15) 0%, transparent 60%);
        opacity: 0;
        transition: opacity 0.2s;
      }

      .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(22,45,32,0.30); }
      .btn-primary:hover::after { opacity: 1; }
      .btn-primary:active { transform: translateY(0); }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <div class="topbar-brand">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 7h-1.26A4.5 4.5 0 0 0 9 5.5V6H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1zm-8 0a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 2.45 2H11v2.17A2.47 2.47 0 0 1 12 7zm0 2h7v2h-7V9zm0 4h7v2h-7v-2zm-5-4h3v2H7V9zm0 4h3v2H7v-2z"/>
        </svg>
        <span>Таємний Санта</span>
      </div>
      <a href="/" class="btn-back">
        <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Головна
      </a>
    </nav>

    <div class="page-content">
      <div class="page-eyebrow">
        <span class="dot"></span>
        <span>Нове свято</span>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-header-inner">
            <div class="header-icon">
              <svg viewBox="0 0 24 24"><path d="M20 7h-1.26A4.5 4.5 0 0 0 9 5.5V6H5a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1zm-8 0a2.5 2.5 0 0 1 0-5 2.5 2.5 0 0 1 2.45 2H11v2.17A2.47 2.47 0 0 1 12 7z"/></svg>
            </div>
            <div>
              <h2>Створити Свято</h2>
              <p>Заповніть деталі вашого свята</p>
            </div>
          </div>
        </div>

        <div class="card-body">
          <form id="createEventForm" method="POST" action="/create-event">
            <div class="form-group">
              <label for="name" class="form-label">Назва свята</label>
              <input
                type="text"
                class="form-control"
                id="name"
                name="name"
                placeholder="Наприклад: Новорічний Таємний Санта"
                required
              />
            </div>
            <div class="form-group">
              <label for="recommendations" class="form-label">Рекомендації</label>
              <textarea
                class="form-control"
                id="recommendations"
                name="recommendations"
                rows="4"
                placeholder="Побажання щодо подарунків, бюджет, тематика…"
              ></textarea>
              <p class="form-hint">Необов'язково — допоможіть учасникам обрати подарунки</p>
            </div>
            <div class="divider"></div>
            <button type="submit" class="btn-primary">
              <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
              Створити свято
            </button>
          </form>
        </div>
      </div>
    </div>

    <script type="module">
      import { getCurrentUser, notify } from './scripts/main.js';
      document
        .getElementById('createEventForm')
        .addEventListener('submit', async function (event) {
          event.preventDefault();
          const formData = new FormData(this);
          const data = Object.fromEntries(formData.entries());
          try {
            const user = await getCurrentUser();
            const response = await fetch('/api/create-event', {
              method: 'POST',
              credentials: 'include',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ ...data, userId: user._id }),
            });

            const result = await response.json();
            if (response.ok) {
              alert('Cвято успішно створено');
              window.location.href = `/event?id=${result.event._id}`;
            } else {
              alert(result.message || 'Помилка створення свята');
            }
          } catch (error) {
            console.error('Помилка:', error);
            alert('Сталася помилка. Спробуйте ще раз пізніше.');
          }
        });
    </script>
  </body>
</html>
